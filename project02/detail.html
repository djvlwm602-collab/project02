<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>맛집 — 오늘 뭐 먹지?</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Square+Round:wght@400;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="detail.css">
</head>
<body>

  <!-- ── 헤더 ── -->
  <header id="detail-header">
    <div class="header-inner">
      <a href="index.html" class="back-btn" aria-label="메인으로 돌아가기">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 12H5M5 12l7-7M5 12l7 7"/>
        </svg>
        오늘 뭐 먹지?
      </a>
      <div id="header-tag"></div>
    </div>
  </header>

  <!-- ── 히어로 ── -->
  <section id="detail-hero">
    <div class="hero-inner">
      <p id="hero-eyebrow"></p>
      <h1 id="hero-title"></h1>
      <p id="hero-count"></p>
    </div>
  </section>

  <!-- ── 정렬 바 ── -->
  <div id="sort-bar" role="toolbar" aria-label="정렬 옵션">
    <div class="sort-inner">
      <button class="sort-btn active" data-sort="distance" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
          <circle cx="12" cy="9" r="2.5"/>
        </svg>
        가장 가까운 순
      </button>
      <button class="sort-btn" data-sort="rating" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        가장 인기있는 순
      </button>
    </div>
  </div>

  <!-- ── 레스토랑 그리드 ── -->
  <main id="restaurant-grid" aria-label="맛집 목록">
    <!-- detail.js가 카드 삽입 -->
  </main>

  <script src="data.js"></script>
  <script src="detail.js"></script>
</body>
</html>
