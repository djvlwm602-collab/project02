<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘 뭐 먹지? — 맛집 탐색기</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Square+Round:wght@400;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 커서 말풍선 -->
  <div id="cursor-bubble" aria-hidden="true">드래그하거나 휠을 굴려보세요</div>

  <!-- 페이지 전환 오버레이 -->
  <div id="page-transition" aria-hidden="true"></div>

  <!-- ─────────────────────────────────────────
       뷰포트 캔버스 (overflow hidden)
       └── canvas-world: 드래그로 이동하는 월드
  ───────────────────────────────────────── -->
  <main id="canvas">

    <!-- 무한 스크롤 월드 컨테이너 — JS가 transform 조작 -->
    <div id="canvas-world" aria-label="탐색 캔버스"></div>

  </main>

<script src="data.js"></script>
  <script src="main.js"></script>
</body>
</html>
